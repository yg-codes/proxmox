[tasks.build]
description = "Build the pve binary"
run = "cd proxmox-admin-cli && make build"

[tasks.install]
description = "Install pve to GOPATH/bin"
depends = ["build"]
run = "cd proxmox-admin-cli && make install"

[tasks.clean]
description = "Remove build artifacts"
run = "cd proxmox-admin-cli && make clean"
