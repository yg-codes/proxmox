version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: pve
    main: ./cmd
    binary: pve
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}-
      {{- .Version }}-
      {{- .Os }}-
      {{- .Arch }}

checksum:
  name_template: checksums.sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - Merge pull request
      - Merge branch

release:
  replace_existing_draft: true
  header: |
    ## pve {{.Tag}}

    Proxmox VE administration CLI with AWS-style command interface.
  footer: |
    **Full changelog**: https://github.com/yg-codes/proxmox/compare/{{ .PreviousTag }}...{{ .Tag }}

